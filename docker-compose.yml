services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # Employee Java Service
  employee-service:
    build:
      context: ./applications/employee-java-service
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/employee_db
      - DATABASE_USERNAME=${DB_USER:-app_user}
      - DATABASE_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - platform-network

  # Notification Python Service
  notification-service:
    build:
      context: ./applications/notification-python-service
      dockerfile: Dockerfile
    environment:
      - SMTP_HOST=${SMTP_HOST:-mail}
      - SMTP_PORT=${SMTP_PORT:-1025}
    ports:
      - "8081:8000"
    depends_on:
      - postgres
    networks:
      - platform-network

  # Payroll .NET Service
  payroll-service:
    build:
      context: ./applications/payroll-dotnet-service
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      - postgres
    networks:
      - platform-network

  # Frontend Angular
  frontend:
    build:
      context: ./applications/frontend-angular
      dockerfile: Dockerfile
    ports:
      - "4200:8080"
    depends_on:
      - employee-service
      - notification-service
      - payroll-service
    networks:
      - platform-network

volumes:
  postgres_data:

networks:
  platform-network:
    driver: bridge
