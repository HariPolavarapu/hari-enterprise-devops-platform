name: Bug Report
description: Report a bug or unexpected behavior.
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can investigate quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the exact steps to reproduce the issue.
      placeholder: |
        1. Clone the repo
        2. Run `docker compose up`
        3. Observe the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: The service should start without errors.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, logs, or screenshots.
      placeholder: The container exits with code 1 and logs show...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Fill in the relevant details.
      value: |
        - OS:
        - Docker version:
        - Terraform version:
        - kubectl version:
        - Helm version:
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, workarounds, or related issues.
      placeholder: I noticed this only happens when...
    validations:
      required: false
