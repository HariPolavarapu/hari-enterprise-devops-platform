version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hari-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hari-network-prod
    restart: always

  # Employee Java Service
  employee-service:
    image: hari-employee-service:latest
    container_name: hari-employee-service-prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/employee_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hari-network-prod
    restart: always

  # Notification Python Service
  notification-service:
    image: hari-notification-service:latest
    container_name: hari-notification-service-prod
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/notification_db
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - hari-network-prod
    restart: always

  # Payroll .NET Service
  payroll-service:
    image: hari-payroll-service:latest
    container_name: hari-payroll-service-prod
    environment:
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=payroll_db;User Id=postgres;Password=${DB_PASSWORD:-postgres};
    ports:
      - "8082:80"
    depends_on:
      - postgres
    networks:
      - hari-network-prod
    restart: always

  # Frontend Angular
  frontend:
    image: hari-frontend:latest
    container_name: hari-frontend-prod
    ports:
      - "4200:80"
    depends_on:
      - employee-service
      - notification-service
      - payroll-service
    networks:
      - hari-network-prod
    restart: always

volumes:
  postgres_prod_data:

networks:
  hari-network-prod:
    driver: bridge
