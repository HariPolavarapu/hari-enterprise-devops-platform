services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      # WARNING: Never commit real passwords. Set TEST_DB_PASSWORD in your environment.
      POSTGRES_PASSWORD: ${TEST_DB_PASSWORD:?TEST_DB_PASSWORD must be set}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - platform-network-test

  employee-service:
    build:
      context: ./applications/employee-java-service
      dockerfile: Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/employee_db_test
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${TEST_DB_PASSWORD:?TEST_DB_PASSWORD must be set}
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - platform-network-test

  notification-service:
    build:
      context: ./applications/notification-python-service
      dockerfile: Dockerfile
    ports:
      - "8081:8000"
    depends_on:
      - postgres
    networks:
      - platform-network-test

  payroll-service:
    build:
      context: ./applications/payroll-dotnet-service
      dockerfile: Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=payroll_db_test;User Id=postgres;Password=${TEST_DB_PASSWORD:?TEST_DB_PASSWORD must be set};
    ports:
      - "8082:8080"
    depends_on:
      - postgres
    networks:
      - platform-network-test

volumes:
  postgres_test_data:

networks:
  platform-network-test:
    driver: bridge
