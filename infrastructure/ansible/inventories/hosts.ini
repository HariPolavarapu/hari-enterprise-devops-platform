# Ansible inventory for DevOps platform hosts
# Replace the placeholder values below with your actual target hostnames or IPs.
# Do not commit real host IPs or credentials to version control.

[devops]
# devops-host ansible_host=<YOUR_DEVOPS_HOST> ansible_user=ubuntu

[monitoring]
# monitoring-host ansible_host=<YOUR_MONITORING_HOST> ansible_user=ubuntu

[all:vars]
ansible_python_interpreter=/usr/bin/python3
