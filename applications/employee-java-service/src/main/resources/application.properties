# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=employee-service

# PostgreSQL Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/employee_db}
spring.datasource.username=${DATABASE_USERNAME:app_user}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.enterprise.platform.employee=${APPLICATION_LOG_LEVEL:INFO}

# Actuator
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.probes.enabled=true
