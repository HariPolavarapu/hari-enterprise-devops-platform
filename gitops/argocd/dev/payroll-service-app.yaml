apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payroll-service-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HariPolavarapu/hari-enterprise-devops-platform.git
    targetRevision: main
    path: gitops/helm-charts/payroll-service
    helm:
      values: |
        environment: dev
        replicaCount: 1
        image:
          tag: dev-latest
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        postgresql:
          host: postgres-dev
          port: 5432
          database: payroll_db_dev
        aspnetcore:
          environment: Development
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise-platform-dev
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
    - CreateNamespace=true
  revisionHistoryLimit: 10
