apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/HariPolavarapu/hari-enterprise-devops-platform.git
    targetRevision: main
    path: gitops/helm-charts/frontend
    helm:
      values: |
        environment: test
        replicaCount: 2
        image:
          tag: test-latest
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        ingress:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-staging"
          hosts:
            - host: app-test.example.com
              paths:
                - path: /
                  pathType: Prefix
  destination:
    server: https://kubernetes.default.svc
    namespace: enterprise-platform-test
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
    - CreateNamespace=true
  revisionHistoryLimit: 10
